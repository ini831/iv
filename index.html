<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 极致深色配色表 */
        :root {
            --bg-body: #0d0d0d;    /* 极致背景 */
            --bg-sidebar: #171717; /* 侧边栏稍亮，区分层次 */
            --bg-input: #2f2f2f;   /* 输入框背景 */
            --text-main: #ececec;  /* 主文字 */
            --text-muted: #8e8e8e; /* 次要文字 */
        }
        body { background-color: var(--bg-body); color: var(--text-main); }
    </style>
</head>
<body class="flex h-screen font-sans">

    <!-- 侧边栏：略浅于背景，产生悬浮感 -->
    <aside class="w-64 bg-[#171717] p-3 flex flex-col justify-between">
        <div class="space-y-2">
            <button class="w-full text-left px-3 py-2 rounded-lg hover:bg-[#202020] transition text-sm">＋ 新聊天</button>
            <div class="text-xs text-[#8e8e8e] px-3 py-2">历史记录</div>
        </div>
        <div class="border-t border-[#2f2f2f] pt-2">
            <div class="px-3 py-2 text-sm text-[#8e8e8e] hover:text-white cursor-pointer transition">设置</div>
        </div>
    </aside>

    <!-- 主聊天区：纯粹的极简风格 -->
    <main class="flex-1 flex flex-col items-center justify-center">
        <h1 class="text-3xl font-semibold mb-10">我们先从哪里开始呢？</h1>
        
        <!-- 模仿 image_2.png 的输入框风格 -->
        <div class="w-full max-w-2xl px-4">
            <div class="bg-[#2f2f2f] rounded-2xl p-4 flex items-center shadow-lg border border-[#404040] hover:border-[#505050] transition">
                <input type="text" placeholder="有问题，尽管问" class="w-full bg-transparent outline-none text-white px-2">
                <div class="flex gap-2">
                    <span class="text-[#8e8e8e] cursor-pointer">🎤</span>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
